name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install backend package (with dev deps)
        run: uv pip install --system -e ".[dev]"

      - name: Type-check (mypy)
        run: mypy app cli.py

      - name: Test (pytest)
        run: pytest
