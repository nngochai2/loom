services:
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474" # browser UI
      - "7687:7687" # bolt
    environment:
      NEO4J_AUTH: neo4j/loom-dev-password
      NEO4J_PLUGINS: "[]"
    volumes:
      - neo4j-data:/data

  # Local LLM for opt-in prose extraction (Phase 6, ADR-0019). The backend
  # only ever calls this over its localhost URL (OLLAMA_BASE_URL) — no code
  # path sends document content to an external/hosted LLM API.
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

volumes:
  neo4j-data:
  ollama-data:
